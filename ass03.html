<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiplication table</title>
  </head>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      /* background-image: url(/asset/imgi_58_default.jpg); */
      background-color: purple;
      justify-content: center;
      margin-top: 40px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
    }
    .container{
        /* background-color: blueviolet; */
        background-image: url("/asset/imgi_13_default.jpg");
        margin-left: 450px;
        margin-top: 300px;
        padding: 20px;
        border-radius: 50px;
        width: 100vh;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    input{
        width: 80%;
        padding: 10px;
        margin: 5px 0;
        border-radius: 20px;
        font-size: larger;
        font-family: cursive;
        background-color: wheat;
    }
    button{
        padding: 10px;
        height: 40px;
        border-radius: 20px;
        border: 2px solid black;
        font-size: larger;
        font-weight: 500;
        background-color: darkmagenta;
        width: 30%;
        margin-top: 10px;
        cursor: pointer;
    }
    table{
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        font-size: 20px;
        font-weight: 600;
        color: rgb(24, 20, 20);
        background-image: url(/asset/imgi_17_default.jpg);
    }
    td, th{
        border: 2px solid black;
        padding: 8px;
        text-align: center;
    }
  </style>
  <body>
    <div class="container">
      <h2>Multiplication table Chat</h2>

      <input type="number" id="start" placeholder="Input your starting point" />
      <input type="number" id="end" placeholder="Input your ending point" />
      <input type="number" id="length"  placeholder="Input the lenght of the table"/>
      <button onclick="table()">Submit</button>
      <div id="output"></div>
    </div>
  </body>
</html>
<script>
  function table() {
    let start = Number(document.getElementById("start").value);
    let end = Number(document.getElementById("end").value);
    let length = Number(document.getElementById("length").value);

    let output = "<table>";
    for (let num = start; num <= end; num++) {
      output += `<tr><th colspan="2">
            Table of ${num}</th></tr>`;
      for (let i = 1; i <= length; i++) {
        output += `
                <tr>
                    <td>${num} * ${i}</td>
                    <td>${num * i}</td>
                    </tr>`;
      }
    }
    output += "</table>";

    document.getElementById("output").innerHTML = output;
  }
</script>
